name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & lint (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  apk:
    name: Android debug APK (docker)
    # The full cross build is heavy; run it on demand or on main.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK in container
        run: SKIP_TESTS=1 ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ntrack-debug-apk
          path: dist/ntrack-debug.apk

# workflow_dispatch enables manual APK builds from the Actions tab
